<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Set New Password · TrueOps</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --danger: #dc2626;
      --border: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, #e0f2fe, var(--bg) 45%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }
    .card {
      width: 100%;
      max-width: 430px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
    }
    .mark {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background: #0f172a;
      color: white;
      display: grid;
      place-items: center;
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 18px;
    }
    h1 { margin: 0; font-size: 28px; letter-spacing: -.7px; }
    p { color: var(--muted); line-height: 1.45; margin: 10px 0 22px; font-weight: 650; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 850;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      outline: none;
      margin-bottom: 14px;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      background: #0f172a;
      color: white;
      font-weight: 900;
      font-size: 16px;
      cursor: pointer;
    }
    .flash {
      padding: 12px 14px;
      border-radius: 14px;
      margin-bottom: 14px;
      font-weight: 750;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }
    .flash.error {
      background: #fef2f2;
      color: var(--danger);
      border-color: #fecaca;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">T</div>
    <h1>Set a new password</h1>
    <p>Create a new password for your TrueOps account.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
      <label for="password">New password</label>
      <input id="password" name="password" type="password" autocomplete="new-password" required>

      <label for="confirm_password">Confirm password</label>
      <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" required>

      <button type="submit">Update password</button>
    </form>
  </main>
</body>
</html>
