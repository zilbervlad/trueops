<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TrueOps{% endblock %}</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --ink: #101827;
      --muted: #64748b;
      --line: rgba(15, 23, 42, 0.10);
      --primary: #0f766e;
      --navy: #111827;
      --soft: #ecfeff;
      --danger: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(20, 184, 166, 0.16), transparent 34rem),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 55%, #eef2f7 100%);
      color: var(--ink);
      min-height: 100vh;
    }

    a { color: inherit; }

    .site {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      text-decoration: none;
      font-weight: 950;
      letter-spacing: -0.04em;
      font-size: 22px;
    }

    .mark {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: var(--navy);
      color: white;
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.18);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-links a {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
    }

    .hero {
      padding: 72px 0 42px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 28px;
      align-items: center;
    }

    .eyebrow {
      color: var(--primary);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 950;
      margin-bottom: 10px;
    }

    h1 {
      font-size: clamp(42px, 7vw, 78px);
      line-height: 0.92;
      letter-spacing: -0.07em;
      margin: 0 0 18px;
    }

    h2 {
      font-size: clamp(28px, 4vw, 42px);
      letter-spacing: -0.05em;
      line-height: 1;
      margin: 0 0 12px;
    }

    h3 {
      margin: 0 0 8px;
      font-size: 18px;
      letter-spacing: -0.03em;
    }

    p, li {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .lead {
      font-size: 19px;
      line-height: 1.65;
      max-width: 720px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 900;
      background: var(--navy);
      color: white;
      border: 1px solid var(--navy);
    }

    .button.secondary {
      background: white;
      color: var(--ink);
      border-color: var(--line);
    }

    .panel {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.10);
      backdrop-filter: blur(16px);
    }

    .phone-card {
      background: var(--navy);
      color: white;
      border-radius: 30px;
      padding: 22px;
      min-height: 360px;
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.28);
    }

    .phone-card p { color: #cbd5e1; }

    .app-row {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 14px;
      margin-top: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin: 26px 0;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 16px 45px rgba(15, 23, 42, 0.06);
    }

    .doc {
      max-width: 850px;
      padding: 42px 0 80px;
    }

    .doc-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: clamp(22px, 4vw, 42px);
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
    }

    .doc-card h1 {
      font-size: clamp(36px, 5vw, 56px);
      margin-bottom: 12px;
    }

    .notice {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      border-radius: 18px;
      padding: 14px 16px;
      font-weight: 800;
      line-height: 1.5;
    }

    .danger {
      background: #fff1f2;
      border-color: #fecdd3;
    }

    .footer {
      padding: 28px 0 42px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .footer a {
      color: var(--muted);
      text-decoration: none;
      font-weight: 800;
      margin-right: 12px;
    }

    @media (max-width: 820px) {
      .hero {
        grid-template-columns: 1fr;
        padding-top: 38px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .nav {
        align-items: flex-start;
      }

      .nav-links {
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="site">
    <nav class="nav">
      <a class="brand" href="/public">
        <span class="mark">✓</span>
        <span>TrueOps</span>
      </a>
      <div class="nav-links">
        <a href="/privacy">Privacy</a>
        <a href="/support">Support</a>
        <a href="/terms">Terms</a>
        <a href="/delete-account">Delete Account</a>
        <a href="/login">Login</a>
      </div>
    </nav>

    {% block content %}{% endblock %}

    <footer class="footer">
      <div>© 2026 TrueOps. All rights reserved.</div>
      <div>
        <a href="/privacy">Privacy</a>
        <a href="/support">Support</a>
        <a href="/terms">Terms</a>
        <a href="/delete-account">Delete Account</a>
      </div>
    </footer>
  </div>
</body>
</html>
