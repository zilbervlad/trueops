{% extends "base.html" %}

{% block title %}Create Account Request · TrueOps{% endblock %}

{% block login_content %}
<div class="login-card" style="max-width: 560px;">
    <div style="text-align:center; margin-bottom: 18px;">
        <img src="{{ url_for('static', filename='bpi-logo.png') }}" alt="TrueOps" style="height:54px; width:54px; border-radius:14px; object-fit:cover;">
        <h1 style="margin:12px 0 6px;">Create Account Request</h1>
        <p class="subtitle" style="margin:0;">Submit your information. Your manager or supervisor will review it before access is activated.</p>
    </div>

    <form method="POST" class="login-form">
        <div class="form-group">
            <label for="full_name">Full Name</label>
            <input type="text" id="full_name" name="full_name" required>
        </div>

        <div class="admin-task-grid">
            <div class="form-group">
                <label for="username">Preferred Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="store_number">Store Number</label>
                <input type="text" id="store_number" name="store_number" value="{{ store_number or '' }}" required>
            </div>
        </div>

        <div class="form-group">
            <label for="requested_position">Position</label>
            <select id="requested_position" name="requested_position">
                <option value="">Select position</option>
                <option value="Driver" {% if requested_position == "Driver" %}selected{% endif %}>Driver</option>
                <option value="CSR" {% if requested_position == "CSR" %}selected{% endif %}>CSR</option>
                <option value="MIT / Shift Runner" {% if requested_position == "MIT / Shift Runner" %}selected{% endif %}>MIT / Shift Runner</option>
                <option value="Manager" {% if requested_position == "Manager" %}selected{% endif %}>Manager</option>
            </select>
        </div>

        <div class="admin-task-grid">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>

            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone">
            </div>
        </div>

        <div class="admin-task-grid">
            <div class="form-group">
                <label for="password">Create Password</label>
                <input type="password" id="password" name="password" required autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password">
            </div>
        </div>

        <button type="submit" class="btn-primary" style="width:100%;">Submit Request</button>
    </form>
</div>
{% endblock %}
